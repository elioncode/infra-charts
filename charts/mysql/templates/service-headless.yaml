{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mysql.headlessServiceName" . }}
  labels:
    {{- include "mysql.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: mysql
      port: {{ .Values.service.port }}
      targetPort: mysql
      protocol: TCP
  selector:
    {{- include "mysql.selectorLabels" . | nindent 4 }}
{{- end }}

