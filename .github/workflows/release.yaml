name: Release Charts

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package charts
        run: |
          set -euo pipefail
          mkdir -p .charts-repo
          for chart in charts/*; do
            if [ -f "$chart/Chart.yaml" ]; then
              helm package "$chart" --destination .charts-repo
            fi
          done
          helm repo index .charts-repo --url https://elioncode.github.io/infra-charts

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: "${{ secrets.GITHUB_TOKEN }}"
          publish_branch: gh-pages
          publish_dir: .charts-repo
